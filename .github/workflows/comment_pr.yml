name: Performance benchmarks

on:
  workflow_run:
    workflows: [Performance benchmarks]
    types: 
      - completed
    branches:
      - main

jobs:
  comment_pr:
    permissions:
      pull-requests: write
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: 'Download artifact'
        uses: actions/github-script@v8
        with:
          script: |
            let allArtifacts = await github.rest.actions.listWorkflowRunArtifacts({
               owner: context.repo.owner,
               repo: context.repo.repo,
               run_id: context.payload.workflow_run.id,
            });
            let matchArtifact = allArtifacts.data.artifacts.filter((artifact) => {
              return artifact.name == "pr_number" || artifact.name == "timing"
            });
            for (let i = 0; i < 2; i++) {
              let download = await github.rest.actions.downloadArtifact({
                 owner: context.repo.owner,
                 repo: context.repo.repo,
                 artifact_id: matchArtifact[i].id,
                 archive_format: 'zip',
              });
              const fs = require('fs');
              const path = require('path');
              const temp = '${{ runner.temp }}/artifacts';
              if (!fs.existsSync(temp)){
                fs.mkdirSync(temp);
              }
              fs.writeFileSync(path.join(temp, matchArtifact[i].name + '.zip'), Buffer.from(download.data));
          }

      - name: 'Unzip artifact'
        run: |
          unzip "${{ runner.temp }}/artifacts/pr_number.zip" -d "${{ runner.temp }}/artifacts"
          unzip "${{ runner.temp }}/artifacts/timing.zip" -d "${{ runner.temp }}/artifacts"
      - name: Comment PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const temp = '${{ runner.temp }}/artifacts';
            const output = fs.readFileSync(path.join(temp, 'timing'), 'utf8');
            output = Buffer.from(output, 'base64').toString('utf8');
            const issue_number = Number(fs.readFileSync(path.join(temp, 'pr_number'));
            github.rest.issues.createComment({
              issue_number: issue_number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Performance benchmarks:\n\n' + output
            });
