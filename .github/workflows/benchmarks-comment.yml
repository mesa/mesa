name: Comment benchmark results

on:
  workflow_run:
    workflows: ["Performance benchmarks"]
    types:
      - completed

permissions:
  issues: write
  pull-requests: write

jobs:
  comment:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve PR number from workflow_run event
        id: pr
        uses: actions/github-script@v8
        with:
          script: |
            const prs = context.payload.workflow_run.pull_requests || [];
            if (prs.length === 0) {
              core.setFailed('No pull request found on workflow_run payload.');
              return;
            }
            core.setOutput('number', String(prs[0].number));

      - name: Download benchmark results
        uses: actions/download-artifact@v8
        with:
          name: benchmark-results
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment PR
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const prNumber = parseInt('${{ steps.pr.outputs.number }}', 10);
            const output = fs.readFileSync('benchmark_output.txt', 'utf8');
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Performance benchmarks:\n\n' + output
            });
